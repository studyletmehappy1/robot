<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot 智能语音助手</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .user-message { align-self: flex-end; background-color: #007bff; color: white; border-bottom-right-radius: 2px; }
        .robot-message { align-self: flex-start; background-color: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
        .streaming-asr { color: #666; font-style: italic; font-size: 0.85rem; margin-top: 5px; text-align: center; height: 20px; }
        .chat-input { display: flex; padding: 15px; background: #fff; gap: 10px; border-top: 1px solid #eee; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .send-btn { background: #007bff; color: white; }
        .send-btn:hover { background: #0056b3; }
        .record-btn { background: #28a745; color: white; min-width: 100px; }
        .record-btn.recording { background: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .status { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .tip { font-size: 0.75rem; color: #999; margin-top: 10px; text-align: center; max-width: 500px; }
    </style>
</head>
<body>
    <div class="status" id="status">正在连接 WebSocket...</div>
    <div class="chat-container">
        <div class="chat-header">Robot 智能语音助手</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message robot-message"><strong>管家:</strong> 您好！我是您的智能语音助手，您可以直接对我说话或输入文字。</div>
        </div>
        <div class="streaming-asr" id="streamingAsr"></div>
        <div class="chat-input">
            <button class="record-btn" id="recordBtn">开始录音</button>
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
    
    <div class="tip">
        温馨提示：若使用内网 IP 访问无法调用麦克风，请在 Chrome 浏览器地址栏输入 <br>
        <code>chrome://flags/#unsafely-treat-insecure-origin-as-secure</code> <br>
        将当前地址加入白名单并开启该实验项。
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const streamingAsr = document.getElementById('streamingAsr');

        let ws;
        let mediaStream;
        let audioContext;
        let processor;
        let isRecording = false;
        let currentRobotMessage = null;

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                status.innerText = "WebSocket 已连接 (就绪)";
                status.style.color = "green";
            };
            
            ws.onclose = () => {
                status.innerText = "WebSocket 已断开，请刷新页面";
                status.style.color = "red";
                setTimeout(initWebSocket, 3000);
            };

            ws.onmessage = async (event) => {
                if (typeof event.data === 'string') {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'asr_chunk') {
                        streamingAsr.innerText = "正在识别: " + data.content;
                    } else if (data.type === 'asr_final') {
                        streamingAsr.innerText = "";
                        addUserMessage(data.content);
                    } else if (data.type === 'text_chunk') {
                        if (!currentRobotMessage) {
                            currentRobotMessage = document.createElement('div');
                            currentRobotMessage.className = 'message robot-message';
                            currentRobotMessage.innerHTML = '<strong>管家:</strong> ';
                            chatMessages.appendChild(currentRobotMessage);
                        }
                        currentRobotMessage.innerHTML += data.content;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    } else if (data.type === 'done') {
                        currentRobotMessage = null;
                        sendBtn.disabled = false;
                    }
                } else {
                    const audioBlob = new Blob([event.data], { type: 'audio/mpeg' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            };
        }

        initWebSocket();

        recordBtn.onclick = async () => {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        };

        async function startRecording() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: {
                    channelCount: 1,
                    sampleRate: 16000
                } });

                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (!isRecording || ws.readyState !== WebSocket.OPEN) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    ws.send(pcmData.buffer);
                };

                isRecording = true;
                recordBtn.innerText = "停止录音";
                recordBtn.classList.add('recording');
            } catch (err) {
                console.error("无法访问麦克风:", err);
                alert("无法访问麦克风，请检查权限或浏览器设置。");
            }
        }

        function stopRecording() {
            isRecording = false;
            recordBtn.innerText = "开始录音";
            recordBtn.classList.remove('recording');
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        }

        function addUserMessage(text) {
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user-message';
            userMsgDiv.innerText = text;
            chatMessages.appendChild(userMsgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || ws.readyState !== WebSocket.OPEN) return;
            addUserMessage(text);
            ws.send(JSON.stringify({ type: 'text', content: text }));
            userInput.value = '';
            sendBtn.disabled = true;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
