<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot 智能语音助手 - Web 测试端</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; height: 80%; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #eee; }
        .message { margin-bottom: 15px; line-height: 1.6; }
        .user-message { color: #007bff; text-align: right; font-weight: bold; }
        .robot-message { color: #333; text-align: left; }
        .input-container { padding: 20px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; outline: none; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <h1>Robot 智能语音助手</h1>
    <div class="chat-container">
        <div id="chatMessages" class="chat-messages">
            <div class="message robot-message">你好！我是你的智能管家，请随时对我下达指令。</div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="输入指令 (如：现在几点了？)" onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
    <div id="status" class="status">正在连接 WebSocket...</div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        let currentRobotMessage = null;

        ws.onopen = () => {
            status.innerText = "WebSocket 已连接，可以开始测试";
            status.style.color = "green";
        };

        ws.onclose = () => {
            status.innerText = "WebSocket 已断开，请刷新页面";
            status.style.color = "red";
        };

        ws.onmessage = async (event) => {
            if (typeof event.data === 'string') {
                const data = JSON.parse(event.data);
                if (data.type === 'text_chunk') {
                    if (!currentRobotMessage) {
                        currentRobotMessage = document.createElement('div');
                        currentRobotMessage.className = 'message robot-message';
                        currentRobotMessage.innerHTML = '<strong>管家:</strong> ';
                        chatMessages.appendChild(currentRobotMessage);
                    }
                    currentRobotMessage.innerHTML += data.content;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                } else if (data.type === 'done') {
                    currentRobotMessage = null;
                    sendBtn.disabled = false;
                }
            } else {
                // 收到音频二进制数据
                const audioBlob = new Blob([event.data], { type: 'audio/mpeg' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play();
            }
        };

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || ws.readyState !== WebSocket.OPEN) return;

            // 显示用户消息
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user-message';
            userMsgDiv.innerText = text;
            chatMessages.appendChild(userMsgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 发送消息
            ws.send(json.stringify({ type: 'text', content: text }));
            userInput.value = '';
            sendBtn.disabled = true;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
